<!doctype html>
<html lang="{{ 'en' if lang == 'en' else 'zh-CN' }}">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ 'Code Lab' if lang=='en' else '编一编' }}</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body class="portal-body"><div class="portal-page">
<header class="portal-header card"><div><p class="neon-label">PSEUDOCODE IDE</p><h1>{{ 'Code Lab' if lang=='en' else '编一编 · 伪代码IDE' }}</h1></div><div class="portal-actions"><a class="secondary" href="{{ url_for('portal', lang=lang) }}">{{ 'Back to Portal' if lang=='en' else '返回入口' }}</a></div></header>
<section class="card code-lab pseudo-wrapper">
  <div class="pseudo-viewport">
    <iframe src="https://pseudoeditor.com/app" class="pseudo-frame" title="PseudoEditor"></iframe>
  </div>
</section>
<section class="card guide-panel">
  <div class="pdf-section-head">
    <h2>{{ 'Pseudocode Guide' if lang=='en' else '伪代码指南' }}</h2>
    <div class="pdf-inline-toolbar pdf-toolbar-right">
      <a class="secondary" href="{{ url_for('static', filename='docs/caie-pseudocode-guide.pdf') }}" target="_blank" rel="noopener">{{ "Open in New Tab" if lang == "en" else "新标签打开" }}</a>
    </div>
  </div>
  <iframe class="pdf-frame" src="{{ url_for('static', filename='docs/caie-pseudocode-guide.pdf') }}#toolbar=1&navpanes=0" title="{{ 'Pseudocode Guide PDF' if lang=='en' else '伪代码指南 PDF' }}"></iframe>
</section>
</div>
</body></html>
