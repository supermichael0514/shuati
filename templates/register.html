<!doctype html>
<html lang="{{ 'en' if lang == 'en' else 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ 'Register' if lang == 'en' else '注册' }} · {{ 'Learning System' if lang == 'en' else '题库练习系统' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="lang-switch auth-lang">
        <a class="secondary {{ 'active' if lang != 'en' else '' }}" href="{{ url_for('register', lang='zh') }}">中文</a>
        <a class="secondary {{ 'active' if lang == 'en' else '' }}" href="{{ url_for('register', lang='en') }}">English</a>
      </div>
      <h1>{{ 'Register' if lang == 'en' else '注册' }}</h1>
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      <div class="flash">{{ messages[0] }}</div>
      {% endif %}
      {% endwith %}
      <form method="post" class="auth-form">
        <label>
          <span>{{ 'Username' if lang == 'en' else '用户名' }}</span>
          <input name="username" autocomplete="username" required>
        </label>
        <label>
          <span>{{ 'Password' if lang == 'en' else '密码' }}</span>
          <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <label>
          <span>{{ 'Birth Date' if lang == 'en' else '出生日期' }}</span>
          <input type="date" name="birth_date" required>
        </label>
        <label>
          <span>{{ 'School' if lang == 'en' else '学校' }}</span>
          <input name="school" required>
        </label>
        <label>
          <span>{{ 'Email' if lang == 'en' else '邮箱' }}</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <button type="submit">{{ 'Register' if lang == 'en' else '注册' }}</button>
      </form>
      <p class="auth-link">{{ 'Already have an account?' if lang == 'en' else '已有账号？' }}<a href="{{ url_for('login', lang=lang) }}">{{ 'Login' if lang == 'en' else '去登录' }}</a></p>
    </div>
  </div>
</body>
</html>
